<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEXIS — Word Game</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --border: #d4c9bc;
    --text: #2c2416;
    --text-muted: #9e9080;
    --correct: #1a6fb5;
    --correct-bg: #d0e8f8;
    --present: #c0392b;
    --present-bg: #fad4d0;
    --absent: #c8c2bc;
    --absent-text: #7a7065;
    --accent: #c07c1a;
    --key-bg: #e8e0d6;
    --key-text: #2c2416;
    --flip-duration: 0.5s;
    --shake-duration: 0.4s;
    --bounce-duration: 0.08s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(192,124,26,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(192,124,26,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    max-width: 500px;
    padding: 20px 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-size: 9px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--text);
    line-height: 1;
  }

  .header-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin-top: 14px;
    opacity: 0.5;
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Toast */
  #toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--text);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 20px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    pointer-events: none;
    text-transform: uppercase;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Word request link */
  #word-request {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
    text-align: center;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.25s, max-height 0.25s;
  }
  #word-request.show {
    opacity: 1;
    max-height: 60px;
    margin-bottom: 4px;
  }
  #word-request a {
    display: block;
    padding: 6px 0 10px;
    color: var(--text-muted);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px, 2.8vw, 14px);
    letter-spacing: 0px;
    line-height: 1.4;
    transition: color 0.15s;
  }
  #word-request a:hover {
    color: var(--accent);
  }

  /* Grid */
  #grid-container {
    position: relative;
    z-index: 1;
    padding: 12px 0;
  }

  #grid {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .tile {
    width: clamp(52px, 13vw, 62px);
    height: clamp(52px, 13vw, 62px);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px, 4.5vw, 22px);
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text);
    background: transparent;
    position: relative;
    transition: border-color 0.1s;
    user-select: none;
    letter-spacing: 0;
  }

  .tile.filled {
    border-color: #444;
    animation: pop var(--bounce-duration) ease;
  }

  .tile.reveal {
    animation: flip var(--flip-duration) ease forwards;
  }

  .tile.correct,
  .tile.present,
  .tile.absent {
    transition: background 0.25s, color 0.25s, border-color 0.25s;
  }
  .tile.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #0d3d6e;
  }
  .tile.present {
    background: var(--present-bg);
    border-color: var(--present);
    color: #7a1a12;
  }
  .tile.absent {
    background: var(--absent);
    border-color: #b0aaa4;
    color: var(--absent-text);
  }

  .row.shake {
    animation: shake var(--shake-duration) ease;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes flip {
    0%   { transform: rotateX(0); }
    50%  { transform: rotateX(-90deg); }
    100% { transform: rotateX(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15%  { transform: translateX(-6px); }
    30%  { transform: translateX(6px); }
    45%  { transform: translateX(-5px); }
    60%  { transform: translateX(5px); }
    75%  { transform: translateX(-3px); }
    90%  { transform: translateX(3px); }
  }

  @keyframes bounce-win {
    0%, 100% { transform: translateY(0); }
    40%       { transform: translateY(-16px); }
  }

  .tile.win-bounce {
    animation: bounce-win 0.5s ease forwards;
  }

  /* Stats bar */
  #stats-bar {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 10px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 2px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .stat-pill span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Keyboard */
  #keyboard {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 0 8px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .key-row {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .key {
    height: clamp(46px, 11vw, 56px);
    min-width: clamp(30px, 7vw, 40px);
    padding: 0 4px;
    border: 1px solid var(--border);
    background: var(--key-bg);
    color: var(--key-text);
    font-family: 'Space Mono', monospace;
    font-size: clamp(10px, 2.5vw, 13px);
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .key:active { transform: scale(0.93); }

  .key.wide {
    min-width: clamp(48px, 11vw, 60px);
    font-size: clamp(8px, 2vw, 10px);
    letter-spacing: 1px;
  }

  .key.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #0d3d6e;
  }
  .key.present {
    background: var(--present-bg);
    border-color: var(--present);
    color: #7a1a12;
  }
  .key.absent {
    background: #d4cec8;
    border-color: #b8b2ac;
    color: #9a9490;
  }

  /* Game over panel */
  #game-over {
    position: fixed;
    inset: 0;
    background: rgba(245,240,235,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  #game-over.show {
    opacity: 1;
    pointer-events: all;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(44,36,22,0.15);
    padding: 32px 40px;
    text-align: center;
    max-width: 340px;
    width: 90%;
  }

  .panel-label {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .panel-word {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .panel-def {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    line-height: 1.6;
    margin-bottom: 24px;
    font-style: italic;
  }

  .panel-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .p-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .p-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .p-stat-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .panel-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0 0 20px;
  }

  .btn-new {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-new:hover, .btn-new:active {
    background: var(--accent);
    color: var(--bg);
  }

  /* How to play */
  #how-to {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 0 16px 8px;
  }

  .how-content {
    display: block;
    padding: 10px 0;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    line-height: 1.8;
    text-align: center;
  }

  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    letter-spacing: 1px;
  }

  .legend-box {
    width: 18px;
    height: 18px;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
  }
  .legend-box.c { background: #d0e8f8; border-color: #1a6fb5; color: #0d3d6e; }
  .legend-box.p { background: #fad4d0; border-color: #c0392b; color: #7a1a12; }
  .legend-box.a { background: #c8c2bc; border-color: #b0aaa4; color: #7a7065; }

  /* New Game button */
  #new-game-bar {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    padding: 8px 8px 20px;
  }

  #btn-new-game {
    width: 100%;
    height: 48px;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: "Space Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #btn-new-game:hover, #btn-new-game:active {
    background: var(--accent);
    color: #fff;
  }

  /* Confirm dialog */
  #confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(245,240,235,0.80);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  #confirm-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  #confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(44,36,22,0.15);
    padding: 28px 32px;
    text-align: center;
    width: 88%;
    max-width: 300px;
    border-radius: 2px;
  }

  .confirm-label {
    font-family: "Playfair Display", serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .confirm-sub {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .confirm-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .confirm-cancel, .confirm-ok {
    flex: 1;
    height: 40px;
    font-family: "Space Mono", monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .confirm-cancel {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
  }

  .confirm-cancel:hover {
    background: var(--bg);
  }

  .confirm-ok {
    background: var(--accent);
    border: 1.5px solid var(--accent);
    color: #fff;
  }

  .confirm-ok:hover {
    opacity: 0.85;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Daily Challenge</div>
  <h1>LEXIS</h1>
  <div class="header-line"></div>
  <div class="subtitle">Five letters · Six attempts</div>
</header>

<div id="how-to">
  <div class="how-content">
    Guess the hidden 5-letter word in 6 tries. Each guess must be a valid word.
    <div class="legend">
      <div class="legend-item"><div class="legend-box c">W</div> correct spot</div>
      <div class="legend-item"><div class="legend-box p">O</div> wrong spot</div>
      <div class="legend-item"><div class="legend-box a">X</div> not in word</div>
    </div>
  </div>
</div>

<div id="stats-bar">
  <div class="stat-pill">Played <span id="s-played">0</span></div>
  <div class="stat-pill">Won <span id="s-won">0</span></div>
  <div class="stat-pill">Streak <span id="s-streak">0</span></div>
</div>

<div id="word-request"><a id="word-request-link" href="#"></a></div>

<div id="grid-container">
  <div id="grid"></div>
</div>

<div id="keyboard"></div>

<div id="new-game-bar">
  <button id="btn-new-game" onclick="confirmNewGame()">New Game</button>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <div class="confirm-label">Start a new game?</div>
    <div class="confirm-sub">Your current progress will be lost.</div>
    <div class="confirm-buttons">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-ok" onclick="confirmYes()">New Game</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="game-over">
  <div class="panel">
    <div class="panel-label" id="go-label">Game Over</div>
    <div class="panel-word" id="go-word"></div>
    <div class="panel-def" id="go-def"></div>
    <div class="panel-divider"></div>
    <div class="panel-stats">
      <div class="p-stat">
        <div class="p-stat-num" id="p-played">0</div>
        <div class="p-stat-label">Played</div>
      </div>
      <div class="p-stat">
        <div class="p-stat-num" id="p-win-pct">0%</div>
        <div class="p-stat-label">Win %</div>
      </div>
      <div class="p-stat">
        <div class="p-stat-num" id="p-streak">0</div>
        <div class="p-stat-label">Streak</div>
      </div>
    </div>
    <button class="btn-new" onclick="confirmNewGame()">New Game</button>
  </div>
</div>

<script>

      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
      rowTiles.push(tile);
    }
    tiles.push(rowTiles);
    grid.appendChild(row);
  }
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────

const ROWS = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['⌫','Z','X','C','V','B','N','M','ENTER']];

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ROWS.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.id = `key-${k}`;
      btn.addEventListener('click', () => handleKey(k));
      rowEl.appendChild(btn);
      if (k.length === 1) keyMap[k] = btn;
    });
    kb.appendChild(rowEl);
  });
}

// ─── Input ────────────────────────────────────────────────────────────────────

function onKeyDown(e) {
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
}

function handleKey(k) {
  if (gameOver) return;
  if (k === '⌫') deleteLetter();
  else if (k === 'ENTER') submitGuess();
  else if (k.length === 1 && /[A-Z]/.test(k)) addLetter(k);
}

function clearCurrentRow() {
  currentCol = 0;
  currentGuess = '';
  tiles[currentRow].forEach(t => { t.textContent = ''; t.classList.remove('filled'); });
}

function addLetter(l) {
  if (currentCol >= 5) return;
  const tile = tiles[currentRow][currentCol];
  tile.textContent = l;
  tile.classList.add('filled');
  currentGuess += l;
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  currentGuess = currentGuess.slice(0,-1);
  const tile = tiles[currentRow][currentCol];
  tile.textContent = '';
  tile.classList.remove('filled');
}

function submitGuess() {
  if (currentCol < 5) { shake(); return toast('Not enough letters'); }
  const word = currentGuess.toLowerCase();
  if (!ANSWER_SET.has(word)) {
    shake();
    toast('Not in word list');
    showWordRequest(word);
    return;
  }

  hideWordRequest();
  const result = score(currentGuess, answer);
  reveal(result);
}

// ─── Scoring ──────────────────────────────────────────────────────────────────

function score(guess, ans) {
  const result = Array(5).fill('absent');
  const ansArr = ans.split('');
  const guessArr = guess.split('');
  const used = Array(5).fill(false);

  // Pass 1: correct
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === ansArr[i]) { result[i] = 'correct'; used[i] = true; }
  }
  // Pass 2: present
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guessArr[i] === ansArr[j]) {
        result[i] = 'present'; used[j] = true; break;
      }
    }
  }
  return result;
}

// ─── Reveal animation ─────────────────────────────────────────────────────────

function reveal(result) {
  const row = currentRow;
  result.forEach((state, i) => {
    const tile = tiles[row][i];
    setTimeout(() => {
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.add(state);
        tile.classList.remove('filled');
        updateKey(currentGuess[i], state);
      }, (250));
    }, i * 300);
  });

  const won = result.every(r => r === 'correct');
  setTimeout(() => {
    currentRow++;
    currentCol = 0;
    currentGuess = '';
    if (won) {
      gameOver = true;
      bounceWin(row);
      setTimeout(() => showGameOver(true), 1200);
    } else if (currentRow >= 6) {
      gameOver = true;
      setTimeout(() => showGameOver(false), 800);
    }
  }, result.length * 300 + 300);
}

function updateKey(letter, state) {
  const btn = keyMap[letter];
  if (!btn) return;
  const priority = { correct: 3, present: 2, absent: 1 };
  const current = btn.classList.contains('correct') ? 3 : btn.classList.contains('present') ? 2 : btn.classList.contains('absent') ? 1 : 0;
  if ((priority[state] || 0) > current) {
    btn.classList.remove('correct','present','absent');
    btn.classList.add(state);
  }
}

function bounceWin(row) {
  tiles[row].forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('win-bounce');
      tile.addEventListener('animationend', () => tile.classList.remove('win-bounce'), { once: true });
    }, i * 100);
  });
}

// ─── UI helpers ───────────────────────────────────────────────────────────────

function shake(onDone) {
  const rowEl = document.getElementById(`row-${currentRow}`);
  rowEl.classList.add('shake');
  rowEl.addEventListener('animationend', () => {
    rowEl.classList.remove('shake');
    if (onDone) onDone();
  }, { once: true });
}

// ─── Word Request ─────────────────────────────────────────────────────────────

function showWordRequest(word) {
  const el = document.getElementById('word-request');
  const link = document.getElementById('word-request-link');
  const upper = word.toUpperCase();
  const formBase = 'https://docs.google.com/forms/d/e/1FAIpQLSdGE_ZNweM3ycrflnGMNzPeHOt-NNCFq4IF4kb1SoH64fuErQ/viewform?usp=pp_url&entry.1590861556=';
  link.href = formBase + encodeURIComponent(upper);
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.textContent = 'Request ' + upper + ' to be added to the word list';
  link.onclick = function() {
    hideWordRequest();
    toast('Thank you for your suggestion');
  };
  el.classList.add('show');
}

function hideWordRequest() {
  document.getElementById('word-request').classList.remove('show');
}



let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}


function confirmNewGame() {
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

function confirmYes() {
  closeConfirm();
  newGame();
}

// Close confirm on overlay click
document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

// ─── Game over ────────────────────────────────────────────────────────────────

function showGameOver(won) {
  if (won) {
    stats.won++;
    stats.streak++;
    toast(['Brilliant!','Splendid!','Great!','Nice!','Phew!','Lucky!'][Math.min(currentRow-1,5)]);
  } else {
    stats.streak = 0;
  }
  stats.played++;
  saveStats();
  updateStatsBar();

  document.getElementById('go-label').textContent = won ? '✦ Solved ✦' : 'The word was';
  document.getElementById('go-word').textContent = answer;
  document.getElementById('go-def').textContent = WORD_DEFS[answer.toLowerCase()] || '';
  document.getElementById('p-played').textContent = stats.played;
  document.getElementById('p-win-pct').textContent = Math.round((stats.won/stats.played)*100) + '%';
  document.getElementById('p-streak').textContent = stats.streak;

  setTimeout(() => document.getElementById('game-over').classList.add('show'), 500);
}

function updateStatsBar() {
  document.getElementById('s-played').textContent = stats.played;
  document.getElementById('s-won').textContent = stats.won;
  document.getElementById('s-streak').textContent = stats.streak;
}

function saveStats() {
  try { localStorage.setItem('lexis_stats', JSON.stringify(stats)); } catch(e){}
}

init();
</script>
